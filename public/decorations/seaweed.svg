<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 400">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bbf7d0"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

  <!--
    Tip displacement math: tip_px = height × sin(angle)
    Stalk height ≈ 355px rendered.
    Gentle sway target: ~2px tip travel → angle = sin⁻¹(2/355) ≈ 0.32°
    Burst target:       ~5px tip travel → angle = sin⁻¹(5/355) ≈ 0.81°
    30s loop: 0–80% gentle sway (24s), 80–93% burst (3.9s), 93–100% settle.
  -->

  <!-- Left stalk -->
  <g>
    <path d="M22,395 C19,358 26,320 17,283 C9,248 22,212 13,175 C6,140 20,106 13,70 C10,50 16,37 17,34"
          stroke="url(#g1)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M17,335 C27,329 33,319 30,311 C27,303 18,310 17,323 Z" fill="#22c55e" opacity="0.91"/>
    <path d="M15,268 C7,262 3,252 6,244 C9,236 16,243 15,256 Z" fill="#4ade80" opacity="0.88"/>
    <path d="M14,200 C23,194 28,184 25,176 C22,168 14,175 14,188 Z" fill="#22c55e" opacity="0.87"/>
    <path d="M14,132 C7,126 3,116 6,108 C9,100 15,107 14,120 Z" fill="#4ade80" opacity="0.84"/>
    <path d="M15,66 C22,60 26,51 23,44 C20,37 15,44 15,56 Z" fill="#86efac" opacity="0.80"/>
    <animateTransform attributeName="transform" type="rotate"
      values="-0.32 22 395; 0.32 22 395; -0.32 22 395; 0.32 22 395; -0.32 22 395; 0.32 22 395; -0.32 22 395; 0.32 22 395; -0.32 22 395; 0.32 22 395; -0.32 22 395; 0.32 22 395; -0.32 22 395; 0.32 22 395; -0.32 22 395; 0.32 22 395; -0.32 22 395; -0.81 22 395; 0.81 22 395; -0.32 22 395; -0.32 22 395"
      keyTimes="0; 0.05; 0.10; 0.15; 0.20; 0.25; 0.30; 0.35; 0.40; 0.45; 0.50; 0.55; 0.60; 0.65; 0.70; 0.75; 0.80; 0.83; 0.87; 0.93; 1"
      dur="30s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.1 0 0.9 1; 0.05 0 0.95 1; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95"/>
  </g>

  <!-- Middle stalk (tallest) -->
  <g>
    <path d="M45,398 C42,360 48,322 40,285 C33,248 44,210 37,173 C30,136 43,100 36,64 C30,32 39,16 38,10"
          stroke="url(#g2)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M41,338 C31,332 26,322 29,314 C32,306 41,313 41,326 Z" fill="#16a34a" opacity="0.93"/>
    <path d="M39,270 C48,264 53,254 50,246 C47,238 39,245 39,258 Z" fill="#22c55e" opacity="0.90"/>
    <path d="M38,202 C29,196 25,186 28,178 C31,170 38,177 38,190 Z" fill="#4ade80" opacity="0.88"/>
    <path d="M37,134 C46,128 51,118 48,110 C45,102 37,109 37,122 Z" fill="#22c55e" opacity="0.85"/>
    <path d="M37,68 C29,62 26,52 29,44 C32,36 37,43 37,56 Z" fill="#4ade80" opacity="0.82"/>
    <path d="M38,22 C44,16 46,8 43,4 C40,0 38,6 38,16 Z" fill="#bbf7d0" opacity="0.75"/>
    <!-- starts opposite phase; burst fires in same window but swings opposite direction -->
    <animateTransform attributeName="transform" type="rotate"
      values="0.32 45 398; -0.32 45 398; 0.32 45 398; -0.32 45 398; 0.32 45 398; -0.32 45 398; 0.32 45 398; -0.32 45 398; 0.32 45 398; -0.32 45 398; 0.32 45 398; -0.32 45 398; 0.32 45 398; -0.32 45 398; 0.32 45 398; -0.32 45 398; 0.32 45 398; 0.81 45 398; -0.81 45 398; 0.32 45 398; 0.32 45 398"
      keyTimes="0; 0.05; 0.10; 0.15; 0.20; 0.25; 0.30; 0.35; 0.40; 0.45; 0.50; 0.55; 0.60; 0.65; 0.70; 0.75; 0.80; 0.83; 0.87; 0.93; 1"
      dur="30s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.1 0 0.9 1; 0.05 0 0.95 1; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95"/>
  </g>

  <!-- Right stalk (medium) -->
  <g>
    <path d="M70,393 C67,356 73,319 68,282 C63,246 70,210 65,174 C60,138 69,103 65,68 C62,47 68,38 67,36"
          stroke="url(#g3)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M67,328 C76,322 81,313 79,305 C77,297 68,303 67,316 Z" fill="#15803d" opacity="0.90"/>
    <path d="M66,260 C58,254 54,245 57,237 C60,229 66,236 66,249 Z" fill="#4ade80" opacity="0.86"/>
    <path d="M65,192 C73,186 78,177 76,169 C74,161 65,168 65,181 Z" fill="#22c55e" opacity="0.85"/>
    <path d="M65,124 C58,118 54,109 57,101 C60,93 65,100 65,113 Z" fill="#4ade80" opacity="0.82"/>
    <path d="M65,60 C72,54 75,45 72,38 C69,31 65,38 65,50 Z" fill="#86efac" opacity="0.78"/>
    <!-- slightly slower loop so it drifts out of phase with the others over time -->
    <animateTransform attributeName="transform" type="rotate"
      values="-0.32 70 393; 0.32 70 393; -0.32 70 393; 0.32 70 393; -0.32 70 393; 0.32 70 393; -0.32 70 393; 0.32 70 393; -0.32 70 393; 0.32 70 393; -0.32 70 393; 0.32 70 393; -0.32 70 393; 0.32 70 393; -0.32 70 393; 0.32 70 393; -0.32 70 393; -0.81 70 393; 0.81 70 393; -0.32 70 393; -0.32 70 393"
      keyTimes="0; 0.05; 0.10; 0.15; 0.20; 0.25; 0.30; 0.35; 0.40; 0.45; 0.50; 0.55; 0.60; 0.65; 0.70; 0.75; 0.80; 0.83; 0.87; 0.93; 1"
      dur="32s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95; 0.1 0 0.9 1; 0.05 0 0.95 1; 0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95"/>
  </g>
</svg>
