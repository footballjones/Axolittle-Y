<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 46">
  <defs>
    <linearGradient id="cap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f6ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#7ec8e8" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="seg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4eef8" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#6ab8dc" stop-opacity="0.78"/>
    </linearGradient>
    <linearGradient id="fan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5aaed4" stop-opacity="0.70"/>
      <stop offset="100%" stop-color="#c0e4f8" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Long antennae -->
  <line x1="72" y1="15" x2="80" y2="4"  stroke="#3a90bc" stroke-width="1.0" stroke-linecap="round" opacity="0.90"/>
  <line x1="72" y1="17" x2="80" y2="9"  stroke="#3a90bc" stroke-width="1.0" stroke-linecap="round" opacity="0.80"/>
  <!-- Short antennules -->
  <line x1="72" y1="19" x2="78" y2="21" stroke="#3a90bc" stroke-width="0.8" stroke-linecap="round" opacity="0.70"/>
  <line x1="72" y1="20" x2="77" y2="25" stroke="#3a90bc" stroke-width="0.8" stroke-linecap="round" opacity="0.65"/>

  <!-- Rostrum -->
  <line x1="73" y1="15" x2="79" y2="10" stroke="#3a90bc" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>

  <!-- Carapace -->
  <path d="M52,13 Q60,9 68,13 Q75,16 75,22 Q75,28 68,31 Q60,34 52,30 Q47,27 47,22 Q47,16 52,13 Z"
        fill="url(#cap)" stroke="#3a90bc" stroke-width="1.1" opacity="0.95"/>

  <!-- Organ spot (visible through translucent body) -->
  <ellipse cx="58" cy="22" rx="5" ry="3.5" fill="#f4a460" fill-opacity="0.30"/>

  <!-- Eye -->
  <circle cx="68" cy="18" r="2.6" fill="#1a3a52" opacity="0.92"/>
  <circle cx="69" cy="17" r="0.9" fill="#ffffff" opacity="0.80"/>

  <!-- Abdomen segments -->
  <path d="M47,16 Q43,13 37,14 Q35,17 37,23 Q43,25 47,23"
        fill="url(#seg)" stroke="#3a90bc" stroke-width="1.0" opacity="0.92"/>
  <path d="M37,14 Q32,13 27,15 Q25,18 27,24 Q32,26 37,23"
        fill="url(#seg)" stroke="#3a90bc" stroke-width="1.0" opacity="0.90"/>
  <path d="M27,15 Q22,16 18,19 Q17,22 19,27 Q23,29 27,24"
        fill="url(#seg)" stroke="#3a90bc" stroke-width="1.0" opacity="0.88"/>
  <path d="M18,19 Q14,21 12,25 Q12,28 14,31 Q18,32 19,27"
        fill="url(#seg)" stroke="#3a90bc" stroke-width="1.0" opacity="0.85"/>

  <!-- Tail fan -->
  <line x1="13" y1="27" x2="5"  y2="19" stroke="#3a90bc" stroke-width="1.1" stroke-linecap="round" opacity="0.80"/>
  <line x1="13" y1="28" x2="3"  y2="24" stroke="#3a90bc" stroke-width="1.1" stroke-linecap="round" opacity="0.80"/>
  <line x1="13" y1="30" x2="4"  y2="36" stroke="#3a90bc" stroke-width="1.1" stroke-linecap="round" opacity="0.80"/>
  <line x1="13" y1="30" x2="10" y2="40" stroke="#3a90bc" stroke-width="1.1" stroke-linecap="round" opacity="0.80"/>
  <ellipse cx="4"  cy="19" rx="4.5" ry="2.5" fill="url(#fan)" stroke="#3a90bc" stroke-width="0.9" opacity="0.88" transform="rotate(-50 4 19)"/>
  <ellipse cx="2"  cy="25" rx="4.5" ry="2.5" fill="url(#fan)" stroke="#3a90bc" stroke-width="0.9" opacity="0.85" transform="rotate(-10 2 25)"/>
  <ellipse cx="4"  cy="37" rx="4.5" ry="2.5" fill="url(#fan)" stroke="#3a90bc" stroke-width="0.9" opacity="0.85" transform="rotate(25 4 37)"/>
  <ellipse cx="10" cy="41" rx="4.5" ry="2.5" fill="url(#fan)" stroke="#3a90bc" stroke-width="0.9" opacity="0.80" transform="rotate(65 10 41)"/>

  <!-- Walking legs -->
  <line x1="54" y1="30" x2="51" y2="40" stroke="#3a90bc" stroke-width="1.0" stroke-linecap="round" opacity="0.65"/>
  <line x1="58" y1="31" x2="56" y2="41" stroke="#3a90bc" stroke-width="1.0" stroke-linecap="round" opacity="0.65"/>
  <line x1="62" y1="32" x2="61" y2="42" stroke="#3a90bc" stroke-width="1.0" stroke-linecap="round" opacity="0.65"/>
  <line x1="66" y1="31" x2="67" y2="41" stroke="#3a90bc" stroke-width="1.0" stroke-linecap="round" opacity="0.62"/>
  <line x1="70" y1="29" x2="72" y2="39" stroke="#3a90bc" stroke-width="1.0" stroke-linecap="round" opacity="0.60"/>

  <!-- Pleopods (swimmerets) -->
  <line x1="38" y1="23" x2="36" y2="31" stroke="#3a90bc" stroke-width="0.75" stroke-linecap="round" opacity="0.55"/>
  <line x1="32" y1="24" x2="30" y2="32" stroke="#3a90bc" stroke-width="0.75" stroke-linecap="round" opacity="0.52"/>
  <line x1="26" y1="25" x2="24" y2="33" stroke="#3a90bc" stroke-width="0.75" stroke-linecap="round" opacity="0.50"/>
  <line x1="21" y1="26" x2="19" y2="34" stroke="#3a90bc" stroke-width="0.75" stroke-linecap="round" opacity="0.48"/>
</svg>
