<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 240">
  <defs>
    <linearGradient id="ctr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#c0a870"/>
      <stop offset="38%"  stop-color="#e2c890"/>
      <stop offset="100%" stop-color="#a08858"/>
    </linearGradient>
    <linearGradient id="lt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#a08858"/>
      <stop offset="52%"  stop-color="#ccb07a"/>
      <stop offset="100%" stop-color="#887048"/>
    </linearGradient>
    <linearGradient id="rt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#887048"/>
      <stop offset="48%"  stop-color="#ccb07a"/>
      <stop offset="100%" stop-color="#a08858"/>
    </linearGradient>
    <linearGradient id="wl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#b89868"/>
      <stop offset="100%" stop-color="#988050"/>
    </linearGradient>
    <!-- Vertical shading so towers look rounded/3-D -->
    <linearGradient id="sdl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#000" stop-opacity="0.22"/>
      <stop offset="60%"  stop-color="#000" stop-opacity="0.00"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="sdc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#000" stop-opacity="0.18"/>
      <stop offset="42%"  stop-color="#000" stop-opacity="0.00"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.15"/>
    </linearGradient>
    <!-- Top-to-bottom depth fade -->
    <linearGradient id="bot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000" stop-opacity="0.00"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.20"/>
    </linearGradient>
  </defs>

  <!-- ══ LEFT TURRET ════════════════════════════════════════════════════════ -->
  <!-- Body — slightly rounded corners for a masonry feel -->
  <rect x="3"   y="82"  width="36" height="158" rx="2" fill="url(#lt)"/>
  <rect x="3"   y="82"  width="36" height="158" rx="2" fill="url(#sdl)"/>
  <rect x="3"   y="82"  width="36" height="158" rx="2" fill="url(#bot)"/>
  <!-- Battlements: 3 merlons separated by crenels -->
  <rect x="3"   y="64"  width="10" height="18"  rx="1" fill="url(#lt)"/>
  <rect x="18"  y="64"  width="10" height="18"  rx="1" fill="url(#lt)"/>
  <rect x="33"  y="64"  width="6"  height="18"  rx="1" fill="url(#lt)"/>
  <!-- Walk ledge -->
  <rect x="3"   y="82"  width="36" height="3.5" fill="#70582a"/>
  <!-- Arrow loop upper -->
  <rect x="15"  y="116" width="8"  height="18"  rx="4" fill="#2e1e08"/>
  <!-- Arrow loop lower -->
  <rect x="15"  y="164" width="8"  height="14"  rx="4" fill="#2e1e08"/>
  <!-- Mortar courses -->
  <line x1="3"  y1="100" x2="39" y2="100" stroke="#88682e" stroke-width="1.1" opacity="0.50"/>
  <line x1="3"  y1="118" x2="39" y2="118" stroke="#88682e" stroke-width="1.1" opacity="0.50"/>
  <line x1="3"  y1="136" x2="39" y2="136" stroke="#88682e" stroke-width="1.1" opacity="0.50"/>
  <line x1="3"  y1="154" x2="39" y2="154" stroke="#88682e" stroke-width="1.1" opacity="0.50"/>
  <line x1="3"  y1="172" x2="39" y2="172" stroke="#88682e" stroke-width="1.1" opacity="0.50"/>
  <line x1="3"  y1="190" x2="39" y2="190" stroke="#88682e" stroke-width="1.1" opacity="0.50"/>
  <line x1="3"  y1="208" x2="39" y2="208" stroke="#88682e" stroke-width="1.1" opacity="0.50"/>
  <!-- Vertical block offsets -->
  <line x1="14" y1="82"  x2="14" y2="100" stroke="#88682e" stroke-width="0.7" opacity="0.35"/>
  <line x1="27" y1="100" x2="27" y2="118" stroke="#88682e" stroke-width="0.7" opacity="0.35"/>
  <line x1="14" y1="118" x2="14" y2="136" stroke="#88682e" stroke-width="0.7" opacity="0.35"/>
  <line x1="27" y1="136" x2="27" y2="154" stroke="#88682e" stroke-width="0.7" opacity="0.35"/>

  <!-- ══ RIGHT TURRET ═══════════════════════════════════════════════════════ -->
  <rect x="111" y="82"  width="36" height="158" rx="2" fill="url(#rt)"/>
  <rect x="111" y="82"  width="36" height="158" rx="2" fill="url(#sdl)"/>
  <rect x="111" y="82"  width="36" height="158" rx="2" fill="url(#bot)"/>
  <rect x="111" y="64"  width="10" height="18"  rx="1" fill="url(#rt)"/>
  <rect x="126" y="64"  width="10" height="18"  rx="1" fill="url(#rt)"/>
  <rect x="141" y="64"  width="6"  height="18"  rx="1" fill="url(#rt)"/>
  <rect x="111" y="82"  width="36" height="3.5" fill="#70582a"/>
  <rect x="127" y="116" width="8"  height="18"  rx="4" fill="#2e1e08"/>
  <rect x="127" y="164" width="8"  height="14"  rx="4" fill="#2e1e08"/>
  <line x1="111" y1="100" x2="147" y2="100" stroke="#88682e" stroke-width="1.1" opacity="0.50"/>
  <line x1="111" y1="118" x2="147" y2="118" stroke="#88682e" stroke-width="1.1" opacity="0.50"/>
  <line x1="111" y1="136" x2="147" y2="136" stroke="#88682e" stroke-width="1.1" opacity="0.50"/>
  <line x1="111" y1="154" x2="147" y2="154" stroke="#88682e" stroke-width="1.1" opacity="0.50"/>
  <line x1="111" y1="172" x2="147" y2="172" stroke="#88682e" stroke-width="1.1" opacity="0.50"/>
  <line x1="111" y1="190" x2="147" y2="190" stroke="#88682e" stroke-width="1.1" opacity="0.50"/>
  <line x1="111" y1="208" x2="147" y2="208" stroke="#88682e" stroke-width="1.1" opacity="0.50"/>
  <line x1="122" y1="82"  x2="122" y2="100" stroke="#88682e" stroke-width="0.7" opacity="0.35"/>
  <line x1="135" y1="100" x2="135" y2="118" stroke="#88682e" stroke-width="0.7" opacity="0.35"/>
  <line x1="122" y1="118" x2="122" y2="136" stroke="#88682e" stroke-width="0.7" opacity="0.35"/>
  <line x1="135" y1="136" x2="135" y2="154" stroke="#88682e" stroke-width="0.7" opacity="0.35"/>

  <!-- ══ CURTAIN WALLS ══════════════════════════════════════════════════════ -->
  <rect x="39"  y="148" width="12" height="92" fill="url(#wl)"/>
  <rect x="39"  y="148" width="12" height="92" fill="url(#bot)"/>
  <rect x="99"  y="148" width="12" height="92" fill="url(#wl)"/>
  <rect x="99"  y="148" width="12" height="92" fill="url(#bot)"/>
  <!-- Wall top crenels (simple notches) -->
  <rect x="39"  y="138" width="5"  height="10" rx="1" fill="url(#wl)"/>
  <rect x="99"  y="138" width="5"  height="10" rx="1" fill="url(#wl)"/>
  <rect x="107" y="138" width="4"  height="10" rx="1" fill="url(#wl)"/>
  <!-- Wall mortar lines -->
  <line x1="39"  y1="164" x2="51" y2="164" stroke="#88682e" stroke-width="0.9" opacity="0.45"/>
  <line x1="39"  y1="182" x2="51" y2="182" stroke="#88682e" stroke-width="0.9" opacity="0.45"/>
  <line x1="39"  y1="200" x2="51" y2="200" stroke="#88682e" stroke-width="0.9" opacity="0.45"/>
  <line x1="39"  y1="218" x2="51" y2="218" stroke="#88682e" stroke-width="0.9" opacity="0.45"/>
  <line x1="99"  y1="164" x2="111" y2="164" stroke="#88682e" stroke-width="0.9" opacity="0.45"/>
  <line x1="99"  y1="182" x2="111" y2="182" stroke="#88682e" stroke-width="0.9" opacity="0.45"/>
  <line x1="99"  y1="200" x2="111" y2="200" stroke="#88682e" stroke-width="0.9" opacity="0.45"/>
  <line x1="99"  y1="218" x2="111" y2="218" stroke="#88682e" stroke-width="0.9" opacity="0.45"/>

  <!-- ══ CENTRAL KEEP ════════════════════════════════════════════════════════ -->
  <rect x="47"  y="22"  width="56" height="218" rx="2" fill="url(#ctr)"/>
  <rect x="47"  y="22"  width="56" height="218" rx="2" fill="url(#sdc)"/>
  <rect x="47"  y="22"  width="56" height="218" rx="2" fill="url(#bot)"/>
  <!-- Battlements: 5 merlons -->
  <rect x="47"  y="4"   width="10" height="18"  rx="1" fill="url(#ctr)"/>
  <rect x="61"  y="4"   width="10" height="18"  rx="1" fill="url(#ctr)"/>
  <rect x="75"  y="4"   width="10" height="18"  rx="1" fill="url(#ctr)"/>
  <rect x="89"  y="4"   width="10" height="18"  rx="1" fill="url(#ctr)"/>
  <rect x="47"  y="22"  width="56" height="3.5" fill="#70582a"/>
  <!-- Upper arched window — proper pointed arch -->
  <path d="M63,58 L63,82 Q75,94 87,82 L87,58 Q75,46 63,58 Z" fill="#2e1e08"/>
  <!-- Narrow arrow loop mid -->
  <rect x="72"  y="110" width="6"  height="22"  rx="3" fill="#2e1e08"/>
  <!-- Lower arched window -->
  <path d="M63,148 L63,170 Q75,182 87,170 L87,148 Q75,136 63,148 Z" fill="#2e1e08"/>
  <!-- Gate — clean semicircular arch -->
  <path d="M60,206 Q60,182 75,182 Q90,182 90,206 L90,240 L60,240 Z" fill="#2e1e08"/>
  <!-- Mortar courses -->
  <line x1="47"  y1="44"  x2="103" y2="44"  stroke="#98782e" stroke-width="1.2" opacity="0.50"/>
  <line x1="47"  y1="68"  x2="103" y2="68"  stroke="#98782e" stroke-width="1.2" opacity="0.50"/>
  <line x1="47"  y1="92"  x2="103" y2="92"  stroke="#98782e" stroke-width="1.2" opacity="0.50"/>
  <line x1="47"  y1="116" x2="103" y2="116" stroke="#98782e" stroke-width="1.2" opacity="0.50"/>
  <line x1="47"  y1="140" x2="103" y2="140" stroke="#98782e" stroke-width="1.2" opacity="0.50"/>
  <line x1="47"  y1="164" x2="103" y2="164" stroke="#98782e" stroke-width="1.2" opacity="0.50"/>
  <line x1="47"  y1="188" x2="103" y2="188" stroke="#98782e" stroke-width="1.2" opacity="0.50"/>
  <!-- Ashlar vertical offsets -->
  <line x1="62"  y1="22"  x2="62"  y2="44"  stroke="#98782e" stroke-width="0.7" opacity="0.36"/>
  <line x1="78"  y1="44"  x2="78"  y2="68"  stroke="#98782e" stroke-width="0.7" opacity="0.36"/>
  <line x1="90"  y1="22"  x2="90"  y2="44"  stroke="#98782e" stroke-width="0.7" opacity="0.36"/>
  <line x1="60"  y1="92"  x2="60"  y2="116" stroke="#98782e" stroke-width="0.7" opacity="0.36"/>
  <line x1="82"  y1="92"  x2="82"  y2="116" stroke="#98782e" stroke-width="0.7" opacity="0.36"/>
  <line x1="60"  y1="188" x2="60"  y2="206" stroke="#98782e" stroke-width="0.7" opacity="0.36"/>
  <line x1="90"  y1="188" x2="90"  y2="206" stroke="#98782e" stroke-width="0.7" opacity="0.36"/>

  <!-- ══ DAMAGE ═══════════════════════════════════════════════════════════════ -->
  <!-- Crack in central keep -->
  <polyline points="70,92 66,114 70,138" stroke="#4a3010" stroke-width="1.5" fill="none" opacity="0.55"/>
  <!-- Crack in left turret -->
  <polyline points="24,136 21,152 25,168" stroke="#4a3010" stroke-width="1.2" fill="none" opacity="0.45"/>
  <!-- Chipped merlon (top-right of keep) -->
  <polygon points="89,4 103,4 103,20 95,22" fill="#c0a070"/>
  <polygon points="89,4 95,4 95,12"         fill="#987040"/>

  <!-- ══ BARNACLES (small encrusting spots — no plants) ════════════════════ -->
  <circle cx="8"   cy="218" r="2.8" fill="#cc6030" opacity="0.82"/>
  <circle cx="16"  cy="226" r="2.2" fill="#e07040" opacity="0.75"/>
  <circle cx="28"  cy="222" r="1.8" fill="#cc6030" opacity="0.70"/>
  <circle cx="122" cy="218" r="2.8" fill="#cc6030" opacity="0.82"/>
  <circle cx="134" cy="224" r="2.2" fill="#e07040" opacity="0.75"/>
  <circle cx="119" cy="228" r="1.8" fill="#cc6030" opacity="0.70"/>
  <circle cx="58"  cy="230" r="2.2" fill="#e07040" opacity="0.72"/>
  <circle cx="92"  cy="232" r="2.0" fill="#cc6030" opacity="0.68"/>
  <circle cx="42"  cy="228" r="1.8" fill="#e07040" opacity="0.65"/>
  <circle cx="108" cy="226" r="1.8" fill="#cc6030" opacity="0.65"/>
</svg>
